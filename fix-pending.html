<!doctype html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>แก้ stock + adminStock — BubbleShop</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; padding: 20px; }
    h1 { text-align: center; margin-bottom: 10px; font-size: 1.4rem; }
    .subtitle { text-align: center; color: #aaa; margin-bottom: 20px; font-size: 0.85rem; }
    #status { text-align: center; padding: 10px; margin-bottom: 15px; border-radius: 8px; background: #16213e; }
    .btn { padding: 10px 24px; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; font-weight: 600; }
    .btn-scan { background: #2196f3; color: #fff; }
    .btn-fix { background: #ff9800; color: #fff; }
    .btn-clean { background: #e91e63; color: #fff; }
    .btn:disabled { background: #555; cursor: not-allowed; }
    .btn-bar { text-align: center; margin-bottom: 20px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85rem; }
    th, td { padding: 6px 10px; border-bottom: 1px solid #333; text-align: left; }
    th { background: #16213e; color: #4fc3f7; }
    .bad { color: #ff9800; font-weight: 700; }
    .fixed { color: #4caf50; font-weight: 700; }
    #log { margin-top: 15px; padding: 10px; background: #0f0f23; border-radius: 8px; font-size: 0.8rem; max-height: 300px; overflow-y: auto; white-space: pre-wrap; color: #aaa; }
  </style>
</head>
<body>
  <h1>แก้ stock + adminStock ให้ตรง stockHistory</h1>
  <p class="subtitle">ขั้น 1: ล้าง record ขยะ → ขั้น 2: สแกน → ขั้น 3: แก้ไข</p>

  <div id="status">กด "1. ล้าง record ขยะ" ก่อน แล้วค่อย "2. สแกน"</div>

  <div class="btn-bar">
    <button class="btn btn-clean" id="btnClean" onclick="cleanJunk()">1. ล้าง record ขยะ</button>
    <button class="btn btn-scan" id="btnScan" onclick="scan()">2. สแกนทั้งหมด</button>
    <button class="btn btn-fix" id="btnFix" onclick="fixAll()" disabled>3. แก้ไขทั้งหมด</button>
  </div>

  <div id="result"></div>
  <div id="log"></div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script>
    let problemItems = [];
    let aliasMap = {};

    async function loadAdminAliases() {
      try {
        const snap = await db.collection('admin_users').get();
        snap.docs.forEach(doc => {
          const d = doc.data();
          const rawName = d.name && d.name !== '-' ? d.name : (d.email ? d.email.split('@')[0] : doc.id);
          const display = d.displayName || rawName;
          if (d.email) {
            aliasMap[d.email] = display;
            aliasMap[d.email.split('@')[0]] = display;
          }
          if (d.name && d.name !== '-') aliasMap[d.name] = display;
          aliasMap[doc.id] = display;
          aliasMap[display] = display; // display → display (identity)
        });
        const unique = [...new Set(Object.values(aliasMap))];
        log('แอดมิน: ' + unique.join(', '));
      } catch (e) {
        log('WARNING: โหลด admin_users ไม่ได้: ' + e.message);
      }
    }

    function resolveName(raw) {
      if (!raw) return 'ไม่ระบุ';
      return aliasMap[raw] || raw;
    }

    // record ขยะ = addedBy ขึ้นต้นด้วย "ระบบ" หรือ note มีคำว่า "แก้"
    function isJunkRecord(d) {
      if (d.addedBy && d.addedBy.startsWith('ระบบ')) return true;
      if (d.note && (d.note.includes('แก้') || d.note.includes('ปรับ'))) return true;
      return false;
    }

    function log(msg) {
      const el = document.getElementById('log');
      el.textContent += msg + '\n';
      el.scrollTop = el.scrollHeight;
    }

    function setStatus(msg) {
      document.getElementById('status').innerHTML = msg;
    }

    async function ensureAuth() {
      if (firebase.auth().currentUser) return true;
      const email = prompt('Email แอดมิน:');
      if (!email) return false;
      const pass = prompt('รหัสผ่าน:');
      if (!pass) return false;
      try {
        await firebase.auth().signInWithEmailAndPassword(email, pass);
        return true;
      } catch (e) {
        alert('Login ไม่ได้: ' + e.message);
        return false;
      }
    }

    // ขั้น 1: ลบ stockHistory record ขยะจากการ fix ครั้งก่อน
    async function cleanJunk() {
      if (!await ensureAuth()) return;
      document.getElementById('btnClean').disabled = true;
      document.getElementById('log').textContent = '';
      setStatus('กำลังสแกนหา record ขยะ...');

      try {
        const itemsSnap = await db.collection('items').get();
        let totalJunk = 0;
        let scanned = 0;
        const junkRefs = [];

        for (const itemDoc of itemsSnap.docs) {
          const histSnap = await itemDoc.ref.collection('stockHistory').get();
          histSnap.docs.forEach(h => {
            if (isJunkRecord(h.data())) {
              junkRefs.push(h.ref);
              totalJunk++;
            }
          });
          scanned++;
          if (scanned % 10 === 0) setStatus(`สแกน ${scanned}/${itemsSnap.size}... พบขยะ ${totalJunk}`);
        }

        if (totalJunk === 0) {
          setStatus('ไม่พบ record ขยะ — ข้ามไป "2. สแกน" ได้เลย');
          log('ไม่พบ record ขยะ');
          document.getElementById('btnClean').disabled = false;
          return;
        }

        if (!confirm(`พบ ${totalJunk} record ขยะ (จากการ fix ครั้งก่อน)\n\nลบทั้งหมด?`)) {
          document.getElementById('btnClean').disabled = false;
          return;
        }

        // ลบ batch ทีละ 500
        for (let i = 0; i < junkRefs.length; i += 500) {
          const batch = db.batch();
          junkRefs.slice(i, i + 500).forEach(ref => batch.delete(ref));
          await batch.commit();
          log(`ลบ batch ${Math.floor(i / 500) + 1}: ${Math.min(500, junkRefs.length - i)} records`);
        }

        setStatus(`<span style="color:#4caf50">ลบ record ขยะ ${totalJunk} รายการแล้ว</span> — กด "2. สแกน" ต่อ`);
        log(`ลบเสร็จ ${totalJunk} records`);
      } catch (e) {
        setStatus('Error: ' + e.message);
        log('ERROR: ' + e.message);
      }
      document.getElementById('btnClean').disabled = false;
    }

    // ขั้น 2: สแกน
    async function scan() {
      if (!await ensureAuth()) return;

      const btnScan = document.getElementById('btnScan');
      const btnFix = document.getElementById('btnFix');
      btnScan.disabled = true;
      btnFix.disabled = true;
      problemItems = [];
      document.getElementById('log').textContent = '';
      setStatus('กำลังสแกน...');

      try {
        await loadAdminAliases();
        const itemsSnap = await db.collection('items').get();
        log(`พบสินค้า ${itemsSnap.size} รายการ`);

        let scanned = 0;
        let problems = 0;

        for (const itemDoc of itemsSnap.docs) {
          const item = itemDoc.data();
          const currentStock = Number(item.stock) || 0;
          const currentAdminStock = item.adminStock || {};

          const histSnap = await itemDoc.ref.collection('stockHistory').get();

          // คำนวณจาก stockHistory (ข้าม record ขยะ + resolve ชื่อ)
          let correctStock = 0;
          const correctAdminStock = {};

          histSnap.docs.forEach(h => {
            const d = h.data();
            if (isJunkRecord(d)) return; // ข้าม record ขยะ
            const qty = d.qty || 0;
            const who = resolveName(d.addedBy);
            correctStock += qty;
            correctAdminStock[who] = (correctAdminStock[who] || 0) + qty;
          });

          const stockDiff = correctStock - currentStock;

          // เช็คว่า adminStock ต้องแก้มั้ย — เทียบ raw keys ด้วย
          // ถ้ามี key ดิบ (bubbleshop.xxx) อยู่ = ต้องแก้ทั้งหมด
          let hasRawKeys = false;
          for (const key of Object.keys(currentAdminStock)) {
            if (key !== resolveName(key)) { hasRawKeys = true; break; }
          }

          const adminDiffs = {};
          let hasAdminDiff = hasRawKeys;
          // เทียบโดย resolve ชื่อ
          const resolvedCurrent = {};
          for (const [key, val] of Object.entries(currentAdminStock)) {
            const resolved = resolveName(key);
            resolvedCurrent[resolved] = (resolvedCurrent[resolved] || 0) + (Number(val) || 0);
          }
          const allAdmins = new Set([...Object.keys(correctAdminStock), ...Object.keys(resolvedCurrent)]);
          for (const admin of allAdmins) {
            const correct = correctAdminStock[admin] || 0;
            const current = resolvedCurrent[admin] || 0;
            if (correct !== current) {
              adminDiffs[admin] = { current, correct };
              hasAdminDiff = true;
            }
          }
          if (hasRawKeys && Object.keys(adminDiffs).length === 0) {
            // ค่าตรงแล้วแต่มี key ดิบ → แสดงว่าต้องแก้ key
            for (const admin of Object.keys(correctAdminStock)) {
              adminDiffs[admin] = { current: resolvedCurrent[admin] || 0, correct: correctAdminStock[admin] || 0 };
            }
          }

          scanned++;

          if (stockDiff !== 0 || hasAdminDiff) {
            problems++;
            problemItems.push({
              id: itemDoc.id,
              name: item.name || itemDoc.id,
              currentStock,
              correctStock,
              stockDiff,
              adminDiffs,
              correctAdminStock
            });

            let detail = stockDiff !== 0 ? `stock: ${currentStock}→${correctStock}` : '';
            if (hasAdminDiff) {
              const ad = Object.entries(adminDiffs).map(([a, d]) => `${a}: ${d.current}→${d.correct}`).join(', ');
              detail += (detail ? ' | ' : '') + ad;
            }
            log(`⚠ ${item.name || itemDoc.id}: ${detail}`);
          }

          if (scanned % 10 === 0) {
            setStatus(`สแกนแล้ว ${scanned}/${itemsSnap.size} ... พบปัญหา ${problems}`);
          }
        }

        setStatus(`สแกนเสร็จ: ${scanned} สินค้า, <span style="color:${problems > 0 ? '#ff9800' : '#4caf50'}">${problems} ต้องแก้</span>`);

        if (problemItems.length > 0) {
          btnFix.disabled = false;
          document.getElementById('result').innerHTML = `
            <table>
              <tr><th>สินค้า</th><th>Stock ปัจจุบัน</th><th>Stock ที่ถูก</th><th>adminStock ที่ผิด</th></tr>
              ${problemItems.map(p => `
                <tr>
                  <td>${esc(p.name)}</td>
                  <td class="${p.stockDiff !== 0 ? 'bad' : ''}">${p.currentStock}</td>
                  <td>${p.correctStock}</td>
                  <td class="${Object.keys(p.adminDiffs).length ? 'bad' : ''}">${Object.entries(p.adminDiffs).map(([a, d]) =>
                    `${esc(a)}: ${d.current}→${d.correct}`
                  ).join(', ') || 'ตรงแล้ว'}</td>
                </tr>
              `).join('')}
            </table>
          `;
        } else {
          document.getElementById('result').innerHTML = '<p style="text-align:center;color:#4caf50;margin-top:20px;">ทุกสินค้าตรงกัน ไม่ต้องแก้</p>';
        }

      } catch (e) {
        setStatus('Error: ' + e.message);
        log('ERROR: ' + e.message);
      }
      btnScan.disabled = false;
    }

    // ขั้น 3: แก้ไข
    async function fixAll() {
      if (problemItems.length === 0) return;
      if (!confirm(`จะแก้ ${problemItems.length} สินค้า — ปรับ stock + adminStock ให้ตรง\n\nยืนยัน?`)) return;

      const btnFix = document.getElementById('btnFix');
      btnFix.disabled = true;
      setStatus('กำลังแก้ไข...');

      let fixed = 0;
      try {
        for (let i = 0; i < problemItems.length; i += 250) {
          const batch = db.batch();
          const chunk = problemItems.slice(i, i + 250);

          chunk.forEach(p => {
            const itemRef = db.collection('items').doc(p.id);
            // ใช้ update เพื่อ REPLACE adminStock ทั้ง map (ลบ key ดิบออก)
            batch.update(itemRef, {
              stock: p.correctStock,
              adminStock: p.correctAdminStock,
              _fixTool: firebase.firestore.FieldValue.serverTimestamp()
            });
          });

          await batch.commit();
          fixed += chunk.length;
          setStatus(`แก้แล้ว ${fixed}/${problemItems.length}...`);
          log(`batch ${Math.floor(i / 250) + 1}: แก้ ${chunk.length} สินค้า`);
        }

        // ล้าง disabled data
        try {
          await db.collection('settings').doc('adminStock').set({ disabled: {} }, { merge: true });
          log('ล้าง disabled admin data แล้ว');
        } catch (e) {
          log('WARNING: ' + e.message);
        }

        setStatus(`<span style="color:#4caf50">แก้เสร็จ ${fixed} สินค้า</span> — stock + adminStock ตรงแล้ว`);
        log(`เสร็จ! แก้ ${fixed} สินค้า`);

        document.querySelectorAll('.bad').forEach(el => { el.className = 'fixed'; });
        problemItems = [];
      } catch (e) {
        setStatus('Error: ' + e.message);
        log('ERROR: ' + e.message);
        btnFix.disabled = false;
      }
    }

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }
  </script>
</body>
</html>
