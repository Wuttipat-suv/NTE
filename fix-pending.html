<!doctype html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>แก้ stock + adminStock — BubbleShop</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; padding: 20px; }
    h1 { text-align: center; margin-bottom: 10px; font-size: 1.4rem; }
    .subtitle { text-align: center; color: #aaa; margin-bottom: 20px; font-size: 0.85rem; }
    #status { text-align: center; padding: 10px; margin-bottom: 15px; border-radius: 8px; background: #16213e; }
    .btn { padding: 10px 24px; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; font-weight: 600; }
    .btn-scan { background: #2196f3; color: #fff; }
    .btn-fix { background: #ff9800; color: #fff; }
    .btn-fix:disabled { background: #555; cursor: not-allowed; }
    .btn-bar { text-align: center; margin-bottom: 20px; display: flex; gap: 10px; justify-content: center; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85rem; }
    th, td { padding: 6px 10px; border-bottom: 1px solid #333; text-align: left; }
    th { background: #16213e; color: #4fc3f7; }
    .bad { color: #ff9800; font-weight: 700; }
    .fixed { color: #4caf50; font-weight: 700; }
    #log { margin-top: 15px; padding: 10px; background: #0f0f23; border-radius: 8px; font-size: 0.8rem; max-height: 250px; overflow-y: auto; white-space: pre-wrap; color: #aaa; }
  </style>
</head>
<body>
  <h1>แก้ stock + adminStock ให้ตรง stockHistory</h1>
  <p class="subtitle">สแกนทุกสินค้า → คำนวณ stock และ adminStock จาก stockHistory → แก้ให้ตรง</p>

  <div id="status">กด "สแกน" เพื่อเริ่ม</div>

  <div class="btn-bar">
    <button class="btn btn-scan" id="btnScan" onclick="scan()">สแกนทั้งหมด</button>
    <button class="btn btn-fix" id="btnFix" onclick="fixAll()" disabled>แก้ไขทั้งหมด</button>
  </div>

  <div id="result"></div>
  <div id="log"></div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script>
    let problemItems = [];

    function log(msg) {
      const el = document.getElementById('log');
      el.textContent += msg + '\n';
      el.scrollTop = el.scrollHeight;
    }

    function setStatus(msg) {
      document.getElementById('status').innerHTML = msg;
    }

    async function ensureAuth() {
      if (firebase.auth().currentUser) return true;
      const email = prompt('Email แอดมิน:');
      if (!email) return false;
      const pass = prompt('รหัสผ่าน:');
      if (!pass) return false;
      try {
        await firebase.auth().signInWithEmailAndPassword(email, pass);
        return true;
      } catch (e) {
        alert('Login ไม่ได้: ' + e.message);
        return false;
      }
    }

    async function scan() {
      if (!await ensureAuth()) return;

      const btnScan = document.getElementById('btnScan');
      const btnFix = document.getElementById('btnFix');
      btnScan.disabled = true;
      btnFix.disabled = true;
      problemItems = [];
      document.getElementById('log').textContent = '';
      setStatus('กำลังสแกน...');

      try {
        const itemsSnap = await db.collection('items').get();
        log(`พบสินค้า ${itemsSnap.size} รายการ`);

        let scanned = 0;
        let problems = 0;

        for (const itemDoc of itemsSnap.docs) {
          const item = itemDoc.data();
          const currentStock = Number(item.stock) || 0;
          const currentAdminStock = item.adminStock || {};

          const histSnap = await itemDoc.ref.collection('stockHistory').get();

          // คำนวณ stock และ adminStock ที่ถูกต้องจาก stockHistory
          let correctStock = 0;
          const correctAdminStock = {};

          histSnap.docs.forEach(h => {
            const d = h.data();
            const qty = d.qty || 0;
            const who = d.addedBy || 'ไม่ระบุ';
            correctStock += qty;
            correctAdminStock[who] = (correctAdminStock[who] || 0) + qty;
          });

          // เช็คว่า stock ตรงมั้ย
          const stockDiff = correctStock - currentStock;

          // เช็คว่า adminStock ตรงมั้ย
          const adminDiffs = {};
          let hasAdminDiff = false;
          const allAdmins = new Set([...Object.keys(correctAdminStock), ...Object.keys(currentAdminStock)]);
          for (const admin of allAdmins) {
            const correct = correctAdminStock[admin] || 0;
            const current = Number(currentAdminStock[admin]) || 0;
            if (correct !== current) {
              adminDiffs[admin] = { current, correct, diff: correct - current };
              hasAdminDiff = true;
            }
          }

          scanned++;

          if (stockDiff !== 0 || hasAdminDiff) {
            problems++;
            problemItems.push({
              id: itemDoc.id,
              name: item.name || itemDoc.id,
              currentStock,
              correctStock,
              stockDiff,
              adminDiffs,
              correctAdminStock
            });

            let detail = `stock: ${currentStock} → ${correctStock}`;
            if (hasAdminDiff) {
              detail += ' | adminStock: ' + Object.entries(adminDiffs)
                .map(([a, d]) => `${a}: ${d.current}→${d.correct}`)
                .join(', ');
            }
            log(`⚠ ${item.name || itemDoc.id}: ${detail}`);
          }

          if (scanned % 10 === 0) {
            setStatus(`สแกนแล้ว ${scanned}/${itemsSnap.size} ... พบปัญหา ${problems}`);
          }
        }

        setStatus(`สแกนเสร็จ: ${scanned} สินค้า, <span style="color:${problems > 0 ? '#ff9800' : '#4caf50'}">${problems} ต้องแก้</span>`);

        if (problemItems.length > 0) {
          btnFix.disabled = false;
          document.getElementById('result').innerHTML = `
            <table>
              <tr><th>สินค้า</th><th>Stock ปัจจุบัน</th><th>Stock ที่ถูก</th><th>adminStock ที่ผิด</th></tr>
              ${problemItems.map(p => `
                <tr>
                  <td>${esc(p.name)}</td>
                  <td class="${p.stockDiff !== 0 ? 'bad' : ''}">${p.currentStock}</td>
                  <td>${p.correctStock}</td>
                  <td class="bad">${Object.entries(p.adminDiffs).map(([a, d]) =>
                    `${esc(a)}: ${d.current}→${d.correct}`
                  ).join(', ') || '-'}</td>
                </tr>
              `).join('')}
            </table>
          `;
        } else {
          document.getElementById('result').innerHTML = '<p style="text-align:center;color:#4caf50;margin-top:20px;">ทุกสินค้าตรงกัน ไม่ต้องแก้</p>';
        }

      } catch (e) {
        setStatus('Error: ' + e.message);
        log('ERROR: ' + e.message);
      }
      btnScan.disabled = false;
    }

    async function fixAll() {
      if (problemItems.length === 0) return;
      if (!confirm(`จะแก้ ${problemItems.length} สินค้า — ปรับ stock + adminStock ให้ตรง stockHistory\n\nยืนยัน?`)) return;

      const btnFix = document.getElementById('btnFix');
      btnFix.disabled = true;
      setStatus('กำลังแก้ไข...');

      let fixed = 0;
      try {
        for (let i = 0; i < problemItems.length; i += 250) {
          const batch = db.batch();
          const chunk = problemItems.slice(i, i + 250);

          chunk.forEach(p => {
            const itemRef = db.collection('items').doc(p.id);
            // set stock ตรงๆ + adminStock ทั้ง map ใหม่
            const updateData = {
              stock: p.correctStock,
              adminStock: p.correctAdminStock,
              _fixTool: firebase.firestore.FieldValue.serverTimestamp()
            };
            batch.set(itemRef, updateData, { merge: true });
          });

          await batch.commit();
          fixed += chunk.length;
          setStatus(`แก้แล้ว ${fixed}/${problemItems.length}...`);
          log(`batch ${Math.floor(i / 250) + 1}: แก้ ${chunk.length} สินค้า`);
        }

        // ล้าง disabled data ใน settings/adminStock
        try {
          await db.collection('settings').doc('adminStock').set({ disabled: {} }, { merge: true });
          log('ล้าง disabled admin data แล้ว');
        } catch (e) {
          log('WARNING: ล้าง disabled ไม่ได้: ' + e.message);
        }

        setStatus(`<span style="color:#4caf50">แก้เสร็จ ${fixed} สินค้า ✓</span> — stock + adminStock ตรง stockHistory แล้ว`);
        log(`เสร็จ! แก้ ${fixed} สินค้า`);

        document.querySelectorAll('.bad').forEach(el => {
          el.className = 'fixed';
        });

        problemItems = [];
      } catch (e) {
        setStatus('Error: ' + e.message);
        log('ERROR: ' + e.message);
        btnFix.disabled = false;
      }
    }

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }
  </script>
</body>
</html>
